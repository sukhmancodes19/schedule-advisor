<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule Advisor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="bootLoader" class="boot-loader">
    <div class="boot-spinner"></div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <div id="authScreen" class="auth-screen hidden">
    <div class="auth-card">
      <div class="auth-header">
        <span class="header-dot"></span>
        <h1>Schedule Advisor</h1>
      </div>
      <p class="auth-subtitle" id="authSubtitle">Log in to sync your schedule across devices.</p>

      <form id="authForm">
        <label class="auth-label">Email
          <input id="authEmail" type="email" required autocomplete="email" />
        </label>
        <label class="auth-label">Password
          <input id="authPassword" type="password" required autocomplete="current-password" minlength="6" />
        </label>
        <p id="authError" class="auth-error hidden"></p>
        <button id="authSubmit" class="auth-submit-btn" type="submit">Log in</button>
      </form>

      <p class="auth-toggle">
        <span id="authToggleText">Don't have an account?</span>
        <button id="authToggleBtn" type="button">Sign up</button>
      </p>

      <button id="guestModeBtn" class="guest-mode-btn" type="button">Continue without an account</button>
    </div>
  </div>

  <div id="board" class="board hidden">
    <header class="board-header">
      <h2>Your Schedule</h2>
      <div class="view-tabs">
        <button class="view-tab active" data-view="board" type="button">📋 Board</button>
        <button class="view-tab" data-view="calendar" type="button">📅 Calendar</button>
      </div>
    </header>

    <div class="columns" id="boardColumns">
      <section class="column" data-column="todo">
        <h3>To Do <span class="count" data-count="todo"></span></h3>
        <div class="cards" data-column="todo"></div>
        <button class="add-card-btn" data-column="todo" type="button">+ Add card</button>
      </section>
      <section class="column" data-column="doing">
        <h3>Doing <span class="count" data-count="doing"></span></h3>
        <div class="cards" data-column="doing"></div>
        <button class="add-card-btn" data-column="doing" type="button">+ Add card</button>
      </section>
      <section class="column" data-column="done">
        <h3>Done <span class="count" data-count="done"></span></h3>
        <div class="cards" data-column="done"></div>
        <button class="add-card-btn" data-column="done" type="button">+ Add card</button>
      </section>
    </div>

    <div class="calendar hidden" id="calendarView">
      <div class="calendar-body">
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>
      <div class="unscheduled-bar" id="unscheduledBar"></div>
    </div>
  </div>

  <div class="app app-hidden" id="app">
    <header class="header">
      <span class="header-dot"></span>
      <h1>Schedule Advisor</h1>
      <button id="personalizeBtn" class="icon-btn" type="button" title="Personalize">&#9881;</button>
      <button id="logoutBtn" class="icon-btn" type="button" title="Log out">&#9211;</button>
      <button id="minimizeChat" class="icon-btn hidden" type="button" title="Minimize">&#8211;</button>
    </header>

    <main id="chat" class="chat"></main>

    <form id="form" class="composer">
      <input
        id="input"
        type="text"
        placeholder="Tell me about your day, tasks, or goals..."
        autocomplete="off"
      />
      <button id="send" type="submit">Send</button>
    </form>
  </div>

  <button id="chatBubble" class="chat-bubble hidden" type="button" title="Open chat">&#128172;</button>

  <div id="taskModal" class="modal-overlay hidden">
    <div class="modal">
      <button id="modalClose" class="modal-close" type="button">&#10005;</button>

      <div class="modal-color-row" id="modalColorRow"></div>

      <input id="modalTitle" class="modal-title-input" type="text" placeholder="Task title" />

      <div class="modal-time-row">
        <label>Start<input id="modalStart" type="time" /></label>
        <label>End<input id="modalEnd" type="time" /></label>
      </div>

      <textarea id="modalDescription" class="modal-description" placeholder="Add a description..."></textarea>

      <div class="modal-image-row">
        <div id="modalImagePreview" class="modal-image-preview hidden">
          <img id="modalImageImg" alt="Task attachment" />
          <button id="modalImageRemove" type="button" title="Remove image">&#10005;</button>
        </div>
        <label class="modal-image-upload-btn">
          &#128247; Add image
          <input id="modalImageInput" type="file" accept="image/*" hidden />
        </label>
      </div>

      <div class="modal-actions">
        <button id="modalDelete" class="modal-delete-btn" type="button">Delete task</button>
        <button id="modalSave" class="modal-save-btn" type="button">Save</button>
      </div>
    </div>
  </div>

  <div id="personalizeModal" class="modal-overlay hidden">
    <div class="modal">
      <button id="personalizeClose" class="modal-close" type="button">&#10005;</button>

      <h2 class="personalize-title">Personalize your assistant</h2>
      <p class="personalize-subtitle">Answer a few quick questions so I can plan schedules that actually fit your life. You can update these anytime.</p>

      <form id="personalizeForm">
        <label class="auth-label">What's your typical wake-up and sleep time?
          <input id="prefSleep" type="text" placeholder="e.g. Wake at 7am, sleep around midnight" />
        </label>

        <label class="auth-label">What do you do for work/study, and what are your typical hours?
          <input id="prefWork" type="text" placeholder="e.g. Software engineer, 9am-5pm weekdays" />
        </label>

        <label class="auth-label">Any recurring daily commitments? (gym, classes, family time, etc.)
          <textarea id="prefCommitments" class="modal-description personalize-textarea" placeholder="e.g. Gym at 6pm, pick up kids at 3pm on Tuesdays"></textarea>
        </label>

        <label class="auth-label">Any planning preferences I should know?
          <textarea id="prefNotes" class="modal-description personalize-textarea" placeholder="e.g. Prefer hard tasks in the morning, need a break every 2 hours"></textarea>
        </label>

        <button id="personalizeSave" class="modal-save-btn personalize-save-btn" type="submit">Save preferences</button>
      </form>
    </div>
  </div>

  <script src="/vendor/marked/marked.umd.js"></script>
  <script src="/vendor/dompurify/purify.min.js"></script>
  <script src="/vendor/jspdf/jspdf.umd.min.js"></script>
  <script src="/vendor/supabase/supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
